<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love Story ❤️</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#1c1c1c;
    overflow:hidden;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

/* Clouds */
.cloud {
    position:absolute;
    width:200px;
    height:100px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
    border-radius:50%;
    animation: moveClouds linear infinite;
}
@keyframes moveClouds {
    0% { transform: translateX(-250px);}
    100% { transform: translateX(120vw);}
}

/* Container for envelopes */
#container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:80px;
    position:relative;
    z-index:5;
}

/* Floating & rotating animation for envelopes */
@keyframes floatRotate {
    0% { transform: translateY(0px) rotateZ(0deg);}
    25% { transform: translateY(-10px) rotateZ(2deg);}
    50% { transform: translateY(0px) rotateZ(0deg);}
    75% { transform: translateY(10px) rotateZ(-2deg);}
    100% { transform: translateY(0px) rotateZ(0deg);}
}

/* Envelope style */
.envelope {
    width:140px; height:90px; background: linear-gradient(145deg, #2c2c2c, #3a1c24);
    border:2px solid #ff4d6d; border-radius:12px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; position:relative; transition: transform 0.3s, box-shadow 0.3s; perspective:800px;
    flex-direction:column; color:#ffb6c1; font-weight:bold; text-align:center; animation: floatRotate 6s ease-in-out infinite;
}
.envelope:hover { transform: scale(1.1); box-shadow:0 8px 25px rgba(255,77,109,0.5);}
.envelope span { margin-top:8px; font-size:16px; }

/* Letter popup */
.letter {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) rotateX(-90deg) scale(0);
    background: #1e1e1e; border:2px solid #ff4d6d; border-radius:12px; padding:35px;
    max-width:600px; max-height:80%; overflow-y:auto; box-shadow:0 0 50px rgba(255,77,109,0.5);
    transition: transform 0.7s ease, opacity 0.7s ease; opacity:0; z-index:9; font-size:18px; line-height:1.6; color:#ffcccc;
}
.letter.show { transform:translate(-50%,-50%) rotateX(0deg) scale(1); opacity:1; }

/* Close button */
.closeBtn { position:absolute; top:12px; right:18px; cursor:pointer; font-size:24px; color:#ff4d6d; font-weight:bold; transition:0.3s; }
.closeBtn:hover { color:#ff1a3c; }

h2 {margin-top:0; color:#ff4d6d; font-weight:700;}
p {margin-top:15px; white-space:pre-line;}

/* Anniversary popup */
#anniversaryPopup {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:#1e1e1e; border:2px solid #ff4d6d; border-radius:12px; padding:30px;
    text-align:center; color:#ffcccc; z-index:20; display:none;
}
#anniversaryPopup button {
    margin:15px; padding:12px 25px; border-radius:8px; border:none; cursor:pointer;
    font-size:16px; font-weight:bold;
}
#iWill { background:#ff4d6d; color:white; }
#iWill:hover { background:#ff1a3c; }
#iWillNot { background:#aaa; color:#333; position:relative; }
</style>
</head>
<body>

<!-- Clouds -->
<div class="cloud" style="top:50px; animation-duration:90s;"></div>
<div class="cloud" style="top:150px; animation-duration:120s;"></div>
<div class="cloud" style="top:300px; animation-duration:100s;"></div>

<!-- Login -->
<div id="login">
<h2>Enter Our Secret 💖</h2>
<input type="password" id="password" placeholder="Password">
<button onclick="checkPassword()">Enter</button>
</div>

<!-- Background music -->
<audio id="bgmusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Envelopes container -->
<div id="container" style="display:none;"></div>

<!-- Anniversary Popup -->
<div id="anniversaryPopup">
<h2>Happy Anniversary ❤️</h2>
<p>To my love, my life, my other half. I promise to never give up on each other.</p>
<button id="iWill">I Will</button>
<button id="iWillNot">I Will Not</button>
</div>

<script>
// Password
function checkPassword(){
    const pass = document.getElementById("password").value;
    if(pass === "0331"){
        document.getElementById("login").style.display = "none";
        document.getElementById("container").style.display = "flex";
        showAnniversaryPopup();
        initEnvelopes();
    } else { alert("Wrong password ❤️"); }
}

// Letters & months
const letters = [
`Month 1: Talking stage, everything magical...`,
`Month 2: Exciting moments, laughter, adventure...`,
`Month 3: Knowing each other, hearts aligned...`,
`Month 4: Honeymoon faith, timeless bliss...`,
`Month 5: Understanding each other, harmony...`,
`Month 6: Discovering love fully, quirks adored...`,
`Month 7: Little fights, spark never fades...`,
`Month 8: Mature love, choosing each other always...`,
`Month 9: Planning future together, intertwined dreams...`,
`Month 10: Love is real, shining brightly...`,
`Month 11: Tested but hearts unwavering...`,
`Month 12: Forever together, love endlessly...`
];
const monthNames = [
"Talking Stage","Exciting Moments","Knowing Each Other","Honeymoon Faith",
"Understanding","Discovering Love","Little Fights","Maturity & Choice",
"Future Planning","Real Love","Tested & True","Forever Together"
];

// Create envelopes
function initEnvelopes(){
    const container = document.getElementById("container");
    letters.forEach((text,i)=>{
        const env = document.createElement("div");
        env.className="envelope";
        env.dataset.index=i;
        env.innerHTML = `<span>${monthNames[i]}</span>`;
        container.appendChild(env);

        const letterDiv = document.createElement("div");
        letterDiv.className="letter";
        letterDiv.innerHTML = `<span class="closeBtn" onclick="closeLetter(this)">✖</span><h2>Month ${i+1}</h2><p>${text}</p>`;
        document.body.appendChild(letterDiv);

        env.addEventListener("click", ()=>{
            letterDiv.classList.add("show");
        });
    });
}

// Close letter
function closeLetter(el){ el.parentElement.classList.remove("show"); }

// Anniversary popup
function showAnniversaryPopup(){
    const popup = document.getElementById("anniversaryPopup");
    popup.style.display="block";
    const iWillNot = document.getElementById("iWillNot");
    iWillNot.addEventListener("mouseenter", ()=>{
        const x = Math.random()*150 - 75;
        const y = Math.random()*50 - 25;
        iWillNot.style.transform=`translate(${x}px,${y}px)`;
    });
    document.getElementById("iWill").addEventListener("click", ()=>{
        alert("❤️ Promise accepted! I will always love you ❤️");
        popup.style.display="none";
    });
}
</script>
</body>
</html>
